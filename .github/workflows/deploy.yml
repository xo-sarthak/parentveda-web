name: Deploy to GitHub Pages

# PRESERVED, BUT DISABLED — the site no longer builds a static export.
#
# Guides now read live from Supabase, which needs a Node runtime for ISR, so
# `output: 'export'` was removed from next.config.ts and `npm run build` no
# longer emits ./out — the artifact this workflow uploads. Left intact (and
# runnable by hand via "Run workflow") rather than deleted.
#
# The push trigger is commented out so this doesn't fail on every commit.
# To re-enable: restore `output: 'export'` in next.config.ts, then uncomment
# the push trigger below. Note guide content would freeze at build time.
#
# The live deploy target is Vercel.

on:
  # push:
  #   branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; don't cancel it mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Turns on GitHub Pages (Actions source) automatically on the first run,
      # so no manual Settings → Pages toggle is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - name: Build static export
        run: npm run build
        # Project sites are served from /<repo-name>, so tell Next.js that prefix.
        # (For a <user>.github.io repo, delete this env block — it serves from root.)
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
